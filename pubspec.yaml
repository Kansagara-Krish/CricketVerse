name: cricketverse_ai
description: "CricketVerse AI - Smart Live Cricket Management System Flutter App"
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  fl_chart: ^0.66.0
  intl: ^0.19.0
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  video_player: ^2.8.6
  flutter_tts: ^4.2.5
  pdf: ^3.12.0
  printing: ^5.15.0
  path_provider: ^2.1.5


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  image_path: "assets/images/logo.jpg"
  adaptive_icon_background: "#010C22"
  adaptive_icon_foreground: "assets/images/logo_foreground.png"
